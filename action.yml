name: "Hive Deploy Action"
description: "Trigger a repository_dispatch event on a target repository"
author: "Hive Solutions"
branding:
  icon: "send"
  color: "orange"
inputs:
  repository:
    description: "Target repository in 'owner/repo' format"
    required: true
  service:
    description: "Service identity. Maps to the HCL file name (nomad/jobs/{group}/{service}.hcl). Use distinct service names for distinct deploys (e.g. 'mailog' vs 'mailog-latest')."
    required: false
  group:
    description: "Group (directory) the service belongs to (e.g. 'mail', 'apps'). Required when 'service' is provided."
    required: false
  tag:
    description: "Image tag. When set, the receiving deploy workflow rewrites image lines in the HCL to this tag and bumps deploy_version. When omitted, only deploy_version is bumped."
    required: false
  channel:
    description: "Deprecated. Accepted for backwards compatibility and passed through to client_payload, but no longer drives behavior. Use distinct 'service' names instead."
    required: false
  event-type:
    description: "Value of the 'event_type' field for the repository_dispatch event. Defaults to 'deploy' when 'service' is provided. Required if 'service' is not provided."
    required: false
  client-payload:
    description: "JSON string sent as 'client_payload'. Defaults to '{}'. Merged with any 'payload-*' keys and the auto-derived service/group/channel/tag (the latter take precedence)."
    required: false
    default: "{}"
  token:
    description: "GitHub token (PAT) with 'repo' scope on the target repository"
    required: true
runs:
  using: "node24"
  main: "dist/index.js"
